<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              poppins: ["Poppins", "sans-serif"],
              roboto: ["Roboto", "sans-serif"],
              montserrat: ["Montserrat", "sans-serif"],
             
            },
            fontSize: {
                customheading: "2.5rem",
                customheadingbig: "5.5rem",
                customheadingmob: "1.2rem",
                customtext: "0.8rem"
            },
            letterSpacing: {
                tracking4: "0.1em",
                tracking5: "0em"
            }

        },
      };

<body class="bg-[url('./images/bg.jpeg')] bg-no-repeat bg-center bg-cover font-poppins">

                    </li>

                <p class="font-medium mb-5">Buy 1 Token. Join the DAO. Change the world!</p>
                <button class="px-5 py-1 bg-fuchsia-600 rounded-md border-transparent border-2 bg-black font-semibold text-lg">Request Early Access</button>
